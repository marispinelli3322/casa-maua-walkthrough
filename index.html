<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Las Casitas - Walkthrough Imersivo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', system-ui, sans-serif; }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }

    /* Welcome screen */
    #welcome {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #2d1f14 0%, #1a2e1a 50%, #1a1a2e 100%);
    }
    #welcome-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 48px 56px;
      max-width: 520px;
      text-align: center;
      color: #f0ebe4;
    }
    #welcome-card .subtitle {
      font-size: 13px; color: rgba(240,235,228,0.5); margin-bottom: 32px;
      letter-spacing: 1px;
    }
    .controls-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 24px; text-align: left;
    }
    .control-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: rgba(240,235,228,0.7);
    }
    .key {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px; font-weight: 600;
      min-width: 40px; text-align: center;
      color: #f0ebe4;
    }
    #enter-btn {
      background: linear-gradient(135deg, #8B6F47, #6B8F71);
      border: none; border-radius: 12px;
      padding: 14px 48px;
      font-size: 16px; font-weight: 500;
      color: white; cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #enter-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(139,111,71,0.4);
    }

    /* Loading */
    #loading {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a1a; color: #f0ebe4;
    }
    #loading.hidden { display: none; }
    .loader-bar {
      width: 200px; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px; margin-top: 16px; overflow: hidden;
    }
    .loader-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #8B6F47, #6B8F71);
      border-radius: 3px; transition: width 0.3s;
    }

    /* HUD */
    #hud { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 10; pointer-events: none; }

    /* Point of interest overlay */
    #poi-overlay {
      position: absolute; bottom: 40px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px 28px;
      color: white;
      text-align: center;
      opacity: 0; transition: opacity 0.5s;
      max-width: 400px;
    }
    #poi-overlay.visible { opacity: 1; }
    #poi-overlay h3 {
      font-size: 16px; font-weight: 300;
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 4px;
    }
    #poi-overlay p {
      font-size: 12px; color: rgba(255,255,255,0.6);
    }

    /* Time of day control */
    #time-control {
      position: absolute; top: 20px; right: 20px;
      pointer-events: all;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 12px 16px;
      color: white;
    }
    #time-control label {
      font-size: 11px; letter-spacing: 1px;
      text-transform: uppercase; display: block;
      margin-bottom: 6px; opacity: 0.6;
    }
    #time-slider { width: 120px; accent-color: #8B6F47; }
    #time-label { font-size: 13px; text-align: center; margin-top: 4px; }

    /* Minimap */
    #minimap {
      position: absolute; bottom: 20px; right: 20px;
      width: 160px; height: 160px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }
    #minimap canvas { width: 100%; height: 100%; }

    /* Controls hint */
    #controls-hint {
      position: absolute; top: 20px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px; color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      background: rgba(0,0,0,0.3);
      padding: 6px 16px; border-radius: 8px;
    }

    @media (max-width: 768px) {
      .controls-grid { grid-template-columns: 1fr; }
      #minimap { width: 120px; height: 120px; }
    }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div id="loading">
    <img src="/logo.png" alt="Las Casitas" style="width: 120px; margin-bottom: 24px; filter: brightness(10);">
    <div style="font-size: 14px; letter-spacing: 2px; text-transform: uppercase;">Carregando...</div>
    <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
  </div>

  <!-- Welcome screen -->
  <div id="welcome" style="display:none">
    <div id="welcome-card">
      <img src="/logo.png" alt="Las Casitas" style="width: 180px; margin-bottom: 16px; filter: brightness(10);">
      <div class="subtitle" style="margin-bottom: 8px;">Mau&aacute; da Serra &middot; Rio de Janeiro</div>
      <div class="subtitle">Projeto Paula Neder &middot; Ricardo Moyano</div>
      <div class="controls-grid">
        <div class="control-item"><span class="key">&uarr; &darr; &larr; &rarr;</span> Caminhar</div>
        <div class="control-item"><span class="key">Arrastar mouse</span> Olhar</div>
        <div class="control-item"><span class="key">Shift</span> Correr</div>
        <div class="control-item"><span class="key">Toque</span> Celular</div>
      </div>
      <button id="enter-btn">Entrar na Casa</button>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud" style="display:none">
    <div id="poi-overlay">
      <h3 id="poi-name"></h3>
      <p id="poi-desc"></p>
    </div>
    <div id="time-control">
      <label>Hora do dia</label>
      <input type="range" id="time-slider" min="0" max="24" step="0.5" value="10">
      <div id="time-label">10:00</div>
    </div>
    <div id="controls-hint">Setas = caminhar &middot; Arrastar mouse = olhar</div>
    <div id="minimap"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
